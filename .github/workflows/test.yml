name: Test

on:
  pull_request:
    branches:
      - development
      - main

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Run tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache
